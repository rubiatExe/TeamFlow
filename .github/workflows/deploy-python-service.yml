name: Deploy Python Service → Cloud Run

on:
  push:
    branches: [main]
    paths:
      # Only trigger when the Python service actually changes
      - 'python_service/**'

# ── Permissions ────────────────────────────────────────────────────────────────
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Step 1: Authenticate to Google Cloud via Workload Identity Federation ─
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # ── Step 2: Set up gcloud CLI ─────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # ── Step 3: Deploy to Cloud Run (source-based deploy) ────────────────────
      # Cloud Run builds the Docker image from source using Cloud Build.
      # No local Docker build needed in CI — keeps the workflow fast.
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: teamflow-python-service
          region: us-central1
          source: ./python_service

          # ── Runtime Environment Variables ──────────────────────────────────
          env_vars: |
            MOCK_MODE=False
            ENVIRONMENT=production
            OTEL_EXPORTER_OTLP_ENDPOINT=https://telemetry.googleapis.com
            OTEL_SERVICE_NAME=teamflow-python-service

          # ── Secrets injected at runtime (from GCP Secret Manager) ─────────
          secrets: |
            GOOGLE_API_KEY=GOOGLE_API_KEY:latest
            SUPABASE_URL=SUPABASE_URL:latest
            SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_KEY:latest

      # ── Step 4: Output deployed URL ───────────────────────────────────────────
      - name: Print deployed URL
        run: echo "Deployed → ${{ steps.deploy.outputs.url }}"
