name: CI — Lint & Type Check

on:
  pull_request:
    branches: [main]

jobs:
  # ── Next.js: TypeScript + ESLint ──────────────────────────────────────────────
  nextjs-checks:
    name: Next.js — TypeScript & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript — type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ── Python: Ruff linter ───────────────────────────────────────────────────────
  python-checks:
    name: Python — Ruff Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Ruff — lint python_service
        run: ruff check python_service/
